[binaries]
c = 'i686-elf-gcc'
asm = 'nasm'
qemu = 'qemu-system-i386'

ar = 'i686-elf-ar'
strip = 'i686-elf-strip'
objcopy = 'i686-elf-objcopy'

[host_machine]
system = 'none'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[properties]
needs_exe_wrapper = true
